name: CI and Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    env:
      IS_TAG_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') }}
      HAS_SIGNING_SECRETS: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 != '' && secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD != '' && secrets.DEVELOPER_ID_APPLICATION != '' && secrets.APPLE_API_KEY_ID != '' && secrets.APPLE_API_ISSUER_ID != '' && secrets.APPLE_API_KEY_P8 != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift build
        run: swift build

      - name: Swift tests
        run: swift test

      - name: Xcode build
        run: xcodebuild -scheme MacAppGrid -destination 'platform=macOS' build

      - name: Require signing secrets for tag releases
        if: env.IS_TAG_RELEASE == 'true' && env.HAS_SIGNING_SECRETS != 'true'
        run: |
          echo "Tag releases must be Developer ID signed and notarized."
          echo "Configure DEVELOPER_ID_CERTIFICATE_BASE64, DEVELOPER_ID_CERTIFICATE_PASSWORD, DEVELOPER_ID_APPLICATION, APPLE_API_KEY_ID, APPLE_API_ISSUER_ID, and APPLE_API_KEY_P8."
          exit 1

      - name: Configure Developer ID signing
        if: env.IS_TAG_RELEASE == 'true' && env.HAS_SIGNING_SECRETS == 'true'
        env:
          DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD || github.run_id }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          NOTARYTOOL_PROFILE: macappgrid-notary
        run: |
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"

          echo "$DEVELOPER_ID_CERTIFICATE_BASE64" | base64 -D > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$DEVELOPER_ID_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          printf '%s' "$APPLE_API_KEY_P8" > "$API_KEY_PATH"
          xcrun notarytool store-credentials "$NOTARYTOOL_PROFILE" \
            --key "$API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID"

      - name: Package unsigned DMG
        if: env.IS_TAG_RELEASE != 'true' || env.HAS_SIGNING_SECRETS != 'true'
        run: ./script/release_build.sh

      - name: Package signed and notarized DMG
        if: env.IS_TAG_RELEASE == 'true' && env.HAS_SIGNING_SECRETS == 'true'
        env:
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          NOTARYTOOL_PROFILE: macappgrid-notary
          VERSION: ${{ github.ref_name }}
          REQUIRE_SIGNED_RELEASE: "1"
        run: ./script/release_build.sh

      - name: Write release notes
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          {
            echo "# MacAppGrid $GITHUB_REF_NAME"
            echo
            echo "This release was built by GitHub Actions as a Developer ID signed and notarized DMG."
            echo
            echo "## Verification"
            echo
            echo "- Swift build: passed"
            echo "- Swift tests: passed"
            echo "- Xcode macOS build: passed"
            echo "- Developer ID signing: required"
            echo "- Notarization and stapling: required"
            echo
            echo "## Assets"
            echo
            for artifact in release/*.dmg release/*.sha256; do
              echo "- $(basename "$artifact")"
            done
            echo
            echo "See README, PRIVACY, SECURITY, and KNOWN_ISSUES before installing beta builds."
          } > release/release-notes.md

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MacAppGrid-release-artifacts
          path: |
            release/*.dmg
            release/*.sha256

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release/*.dmg release/*.sha256 \
            --notes-file release/release-notes.md \
            --title "MacAppGrid $GITHUB_REF_NAME"
