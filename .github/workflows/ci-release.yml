name: CI and Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift build
        run: swift build

      - name: Swift tests
        run: swift test

      - name: Xcode build
        run: xcodebuild -scheme MacAppGrid -destination 'platform=macOS' build

      - name: Package DMG
        run: ./script/release_build.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: MacAppGrid-DMG
          path: release/*.dmg

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release/*.dmg --generate-notes --title "$GITHUB_REF_NAME"
